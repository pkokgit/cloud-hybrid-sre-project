apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: sre-project
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      containers:
      - name: sre-app
        image: 412374075674.dkr.ecr.ap-southeast-2.amazonaws.com/sre-app:latest
        ports:
        - containerPort: 8000
        env:
        - name: AZURE_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: azure-creds
              key: AZURE_TENANT_ID
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: azure-creds
              key: AZURE_CLIENT_ID
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: azure-creds
              key: AZURE_CLIENT_SECRET
        - name: KEYVAULT_NAME
          valueFrom:
            secretKeyRef:
              name: azure-creds
              key: KEYVAULT_NAME