apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: sre-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
    spec:
      containers:
      - name: sre-app
        image: 412374075674.dkr.ecr.ap-southeast-2.amazonaws.com/sre-app:latest
        ports:
        - containerPort: 8000